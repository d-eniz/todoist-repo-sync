name: Demo Sync GitHub to Todoist

on:
  issues:
    types: [opened, reopened, assigned]
  pull_request:
    types: [opened, reopened, assigned]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      TODOIST_TOKEN_VALUE: ${{ secrets.TODOIST_TOKEN }}
      TODOIST_PROJECT_ID_VALUE: ${{ secrets.TODOIST_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Explain missing secrets
        if: ${{ env.TODOIST_TOKEN_VALUE == '' || env.TODOIST_PROJECT_ID_VALUE == '' }}
        run: |
          echo "Todoist secrets unavailable for this run."
          echo "Common causes: fork PR, Dependabot, wrong secret scope, or missing secret name."
          exit 1

      - name: Run local action
        if: ${{ env.TODOIST_TOKEN_VALUE != '' && env.TODOIST_PROJECT_ID_VALUE != '' }}
        uses: ./
        with:
          todoist-token: ${{ env.TODOIST_TOKEN_VALUE }}
          todoist-project-id: ${{ env.TODOIST_PROJECT_ID_VALUE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
