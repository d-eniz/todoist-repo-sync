name: Demo Sync GitHub to Todoist

on:
  issues:
    types: [opened, reopened, assigned]
  pull_request:
    types: [opened, reopened, assigned]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Todoist secrets
        id: validate_secrets
        env:
          TODOIST_TOKEN_VALUE: ${{ secrets.TODOIST_TOKEN }}
          TODOIST_PROJECT_ID_VALUE: ${{ secrets.TODOIST_PROJECT_ID }}
        run: |
          if [ -z "$TODOIST_TOKEN_VALUE" ] || [ -z "$TODOIST_PROJECT_ID_VALUE" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Todoist secrets unavailable for this run."
            echo "Common causes: fork PR, Dependabot, wrong secret scope, or missing secret name."
            exit 1
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Run local action
        if: ${{ steps.validate_secrets.outputs.available == 'true' }}
        uses: ./
        env:
          TODOIST_TOKEN: ${{ secrets.TODOIST_TOKEN }}
          TODOIST_PROJECT_ID: ${{ secrets.TODOIST_PROJECT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          todoist-token: ${{ secrets.TODOIST_TOKEN }}
          todoist-project-id: ${{ secrets.TODOIST_PROJECT_ID }}
          github-token: ${{ github.token }}
