name: Release Action

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select semantic version bump for this release.
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump release version
        id: version
        run: |
          npm version "${{ github.event.inputs.release_type }}" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          major="v$(node -p "require('./package.json').version.split('.')[0]")"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "major_tag=${major}" >> "$GITHUB_OUTPUT"

      - name: Build action runtime
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Commit and tag release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          MAJOR_TAG: ${{ steps.version.outputs.major_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json dist
          git commit -m "chore(release): ${VERSION}"
          git tag "${TAG}"
          git tag -f "${MAJOR_TAG}"
          git push origin "${GITHUB_REF_NAME}"
          git push origin "${TAG}"
          git push origin "${MAJOR_TAG}" --force

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            --generate-notes
